# =============================================================================
# daily-slate.yml
# -----------------------------------------------------------------------------
# Once-a-day autonomous slate generator.  Runs predict.py to score the day's
# games, then BAKES the resulting picks_*.csv and parlay_*.txt directly into
# docs/data/ as part of the same workflow run.  Both the new slate output and
# the baked dashboard data ship in a single commit.
#
# Why bake inline (instead of relying on the separate bake-data workflow):
# pushes made via GITHUB_TOKEN do NOT trigger other workflows, so the
# bake-data workflow won't fire on commits this job pushes.  Doing the bake
# in the same job avoids that limitation.
#
# Trigger:
#   - schedule: 11:00 UTC (~7am ET, after lineups firm up overnight)
#   - manual via "Run workflow" with optional slate_date input
# =============================================================================
name: Daily slate run

on:
  schedule:
    # Multiple runs per day so the slate self-heals when MLB confirms games
    # / pitchers / lineups after the morning run.  Each run regenerates
    # picks_*.csv and parlay_*.txt; the bake step commits only if changed.
    # NIGHT-OWL early-bake of TOMORROW's slate.  At 06:00 UTC (10pm PT prev day,
    # 1am PT new day, 2am ET new day) we explicitly run with TOMORROW's UTC date
    # so a user checking late at night already sees the upcoming day's slate.
    # Without this, there's a 14-hour gap between the 21:00 UTC run (5pm ET) and
    # the 11:00 UTC run (7am ET) where no slate exists for the upcoming UTC day.
    - cron: "0 6 * * *"      # 1am PT  — bakes TOMORROW's slate (next UTC day)
    - cron: "0 11 * * *"     # 7am ET  — catches overnight schedule + SP firming
    - cron: "0 14 * * *"     # 10am ET — late-add games and SP swaps
    - cron: "0 17 * * *"     # 1pm ET  — pre-afternoon-game lineup cards
    - cron: "0 21 * * *"     # 5pm ET  — pre-evening-game lineup cards + odds refresh
    - cron: "0 * * * *"      # hourly catch-all for late lineup updates
  workflow_dispatch:
    inputs:
      slate_date:
        description: 'Slate date YYYY-MM-DD (default: today)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sanity-check that the model bundle is present
        run: |
          if [ ! -f "models/latest.pkl" ]; then
            echo "::error::models/latest.pkl is missing - predict.py cannot score without it."
            ls -la models/ || true
            exit 1
          fi
          ls -lh models/

      - name: Write .env from secret
        run: |
          echo "ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}" > .env

      - name: Run predict.py
        # Three sources can supply the date, in priority order:
        #   1. workflow_dispatch input (manual override)
        #   2. The 06:00 UTC cron is special — it bakes TOMORROW's slate, so a
        #      user checking late at night the previous day already sees it.
        #   3. Otherwise predict.py picks its own UTC default.
        run: |
          DATE_ARG="${{ inputs.slate_date }}"
          SCHED="${{ github.event.schedule }}"
          if [ -z "$DATE_ARG" ] && [ "$SCHED" = "0 6 * * *" ]; then
            DATE_ARG=$(date -u -d "tomorrow" +%Y-%m-%d)
            echo "::notice::Night-owl 06:00 UTC cron detected — explicitly baking tomorrow's slate ($DATE_ARG)"
          fi
          if [ -z "$DATE_ARG" ]; then
            python predict.py --skip-weights
          else
            python predict.py "$DATE_ARG" --skip-weights
          fi

      - name: Run totals (over/under) predict
        # Companion totals model — picks_totals_<date>.csv has the same matchups
        # as the diag CSV with total_line, pred_runs, edge_runs, side (over/under),
        # decimal odds, our_prob, and Kelly stake_units. The dashboard reads this
        # file alongside picks_*_diag.csv to render the O/U column. Failure here
        # should NOT kill the moneyline slate — if totals_latest.pkl is missing
        # or the totals API call fails, we log and continue so picks_*_diag.csv
        # still ships. Most days totals is a "nice-to-have" overlay on the
        # primary moneyline slate.
        continue-on-error: true
        run: |
          DATE_ARG="${{ inputs.slate_date }}"
          SCHED="${{ github.event.schedule }}"
          if [ -z "$DATE_ARG" ] && [ "$SCHED" = "0 6 * * *" ]; then
            DATE_ARG=$(date -u -d "tomorrow" +%Y-%m-%d)
          fi
          if [ -z "$DATE_ARG" ]; then
            DATE_ARG=$(date -u +%Y-%m-%d)
          fi
          OUT_FILE="picks_totals_${DATE_ARG}.csv"
          echo "Running totals predict for $DATE_ARG -> $OUT_FILE"
          if [ ! -f "models/totals_latest.pkl" ]; then
            echo "::warning::models/totals_latest.pkl missing — skipping totals predict"
            exit 0
          fi
          python -m mlb_edge.main_totals --mode predict \
            --date "$DATE_ARG" --out "$OUT_FILE" || \
            echo "::warning::totals predict failed; continuing without it"
          if [ -f "$OUT_FILE" ]; then
            echo "totals predict succeeded:"
            wc -l "$OUT_FILE"
            head -2 "$OUT_FILE"
          fi

      - name: Validate fair_prob / edge_pp populated in slate CSV
        run: |
          python3 - <<'PY'
          import glob, csv, sys
          # Find newest picks_*_diag.csv
          diags = sorted(glob.glob("picks_*_diag.csv"))
          if not diags:
              print("::warning::no diag CSV produced (slate empty?)"); sys.exit(0)
          path = diags[-1]
          with open(path) as f:
              rows = list(csv.DictReader(f))
          if not rows:
              print(f"::warning::{path} has 0 rows"); sys.exit(0)
          # PENDING_SP_DATA rows are EXPECTED to be blank — the model couldn't
          # score them because one or both starters lack the Statcast sample
          # required (rookies/openers/just-off-IL, or probable SP not announced
          # yet). Excluding them from the denominator keeps the threshold
          # focused on rows that should have populated odds-derived columns.
          scoreable = [r for r in rows if (r.get("tier") or "").strip() != "PENDING_SP_DATA"]
          n_pending = len(rows) - len(scoreable)
          blanks = [r for r in scoreable if not (r.get("fair_prob") or "").strip() or not (r.get("edge_pp") or "").strip()]
          # Tolerate a small fraction (TBD pitchers, bad data) — alarm only if MOST rows are blank
          if scoreable and len(blanks) >= max(2, int(len(scoreable) * 0.5)):
              print(f"::error::fair_prob/edge_pp blank on {len(blanks)}/{len(scoreable)} scoreable rows in {path} (plus {n_pending} PENDING_SP_DATA rows excluded).")
              print(f"::error::This usually means ODDS_API_KEY is missing or odds-API failed. Re-run after checking secret.")
              for r in blanks[:3]:
                  print(f"  blank row: {r.get('matchup')} fair={r.get('fair_prob')!r} edge={r.get('edge_pp')!r} odds_status={r.get('odds_status')!r}")
              sys.exit(1)
          print(f"OK: {len(scoreable)-len(blanks)}/{len(scoreable)} scoreable rows have fair_prob+edge_pp populated ({n_pending} PENDING_SP_DATA rows excluded)")
          PY

      - name: Bake new slate files into docs/data/
        run: |
          mkdir -p docs/data
          cp -v picks_*_diag.csv          docs/data/ 2>/dev/null || echo "no diag CSVs to bake"
          cp -v picks_*_news_overrides.csv docs/data/ 2>/dev/null || echo "no news CSVs to bake"
          cp -v picks_totals_*.csv         docs/data/ 2>/dev/null || echo "no totals CSVs to bake"
          cp -v parlay_*.txt              docs/data/ 2>/dev/null || echo "no parlay TXTs to bake"

      - name: Rebuild manifest.json of available dates
        run: |
          python3 - <<'PY'
          import json, re
          from pathlib import Path
          d = Path("docs/data")
          dates = set()
          for f in d.glob("picks_*_diag.csv"):
              m = re.search(r"(\d{4}-\d{2}-\d{2})", f.name)
              if m: dates.add(m.group(1))
          (d / "manifest.json").write_text(json.dumps({"dates": sorted(dates, reverse=True)}, indent=2))
          print(f"manifest now has {len(dates)} dates")
          PY

      - name: Commit + push slate output and baked data in one shot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Structure gate: skip the commit when SP/lineups are unchanged vs
          # HEAD. The diag still churns every bake from Monte-Carlo/odds
          # jitter; committing that is pure noise. data/state does not change
          # in this job, so skipping loses nothing real. The gate fail-safes
          # to commit on any error, so it can never freeze the slate.
          if ! python tools/slate_structure_gate.py; then
            echo "slate structure unchanged vs HEAD - skipping churn commit"
            exit 0
          fi
          git add picks_*.csv parlay_*.txt docs/data/ data/state/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes to commit (nothing changed today)"
          else
            git commit -m "daily-slate: $(date -u +%Y-%m-%d) auto-run + bake"
            git push
          fi
