# =============================================================================
# savant-harvest.yml
# -----------------------------------------------------------------------------
# Standalone scheduled job that runs the Baseball Savant CSV scraper every
# midnight UTC.  Pulls all 42 Statcast leaderboards and commits any deltas
# back to the repo so the model has fresh inputs the next time predict.py runs.
#
# Why a separate workflow instead of folding into daily-slate.yml:
#   - Keeps responsibilities clean: this one ONLY refreshes Savant; failures
#     here don't block the slate generator.
#   - Different cadence: slate runs 5x/day for in-day refinement; Savant
#     leaderboards only update once-a-day overnight, so a daily fetch is enough.
#   - GITHUB_TOKEN pushes don't trigger downstream workflows, so daily-slate
#     gets the new CSVs from the working tree on its own next run.
# =============================================================================
name: Savant CSV harvest

on:
  schedule:
    - cron: "0 0 * * *"   # 00:00 UTC = 8 PM ET / 5 PM PT (prev day) — runs every "midnight"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Harvest all 42 Savant leaderboards (current year)
        run: |
          python -m mlb_edge.savant_scraper --year $(date -u +%Y) --overwrite

      - name: Verify at least the 5 LOAD_CRITICAL endpoints landed
        run: |
          # Cron runs at 00:00 UTC. Some Savant endpoints don't refresh until
          # 02:00–04:00 UTC the next day, so accept the prior day's stamp as
          # a proven-fresh harvest. We only fail if neither today's nor
          # yesterday's CSV is on disk for a given endpoint.
          STAMP_TODAY=$(date -u +%Y%m%d)
          STAMP_YEST=$(date -u -d 'yesterday' +%Y%m%d)
          REQUIRED_NAMES=(
            "savant_bat_tracking/bat_tracking_*"
            "savant_extra/savant_expected-stats-batter"
            "savant_extra/savant_expected-stats-pitcher"
            "savant/outs-above-average/outs-above-average"
            "savant/fielding-run-value/fielding-run-value"
          )
          missing=0
          for base in "${REQUIRED_NAMES[@]}"; do
            today_pat="data/${base}_${STAMP_TODAY}.csv"
            yest_pat="data/${base}_${STAMP_YEST}.csv"
            if ls $today_pat >/dev/null 2>&1; then
              echo "OK (today):     $today_pat"
            elif ls $yest_pat >/dev/null 2>&1; then
              echo "OK (yesterday): $yest_pat (today's stamp not yet available)"
            else
              echo "::error::missing required Savant CSV: neither $today_pat nor $yest_pat"
              missing=$((missing+1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing of 5 LOAD_CRITICAL Savant endpoints failed to harvest"
            exit 1
          fi

      - name: Commit + push any new CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/savant data/savant_extra data/savant_bat_tracking data/savant_2025 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no Savant CSV changes today (data unchanged or scraper hit cache) — nothing to commit"
          else
            git commit -m "savant-harvest: $(date -u +%Y-%m-%d) midnight CSV refresh"
            git push
          fi
