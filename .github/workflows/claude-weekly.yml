# =============================================================================
# claude-weekly.yml
# -----------------------------------------------------------------------------
# Sunday batch — Claude reviews the past 7 days of (pick, outcome) pairs and
# writes a Markdown memo to docs/data/weekly/<sunday>.md identifying which
# signals are working, which aren't, and concrete rule-change suggestions.
#
# Triggers right after the calibration refit (which runs Sunday 04:00 UTC),
# so Claude has the freshest model state to review.
# =============================================================================
name: Claude weekly memo

on:
  schedule:
    - cron: "30 4 * * 0"   # Sunday 04:30 UTC = 12:30 AM ET / 9:30 PM PT Saturday
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  memo:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run weekly memo
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-opus-4-6
        run: |
          python tools/run_claude_weekly.py

      - name: Commit + push if memo written
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/weekly/
          if git diff --cached --quiet; then
            echo "no new weekly memo to commit"
          else
            git commit -m "claude-weekly: $(date -u +%Y-%m-%d) memo"
            git push
          fi
