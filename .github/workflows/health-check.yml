# =============================================================================
# health-check.yml
# -----------------------------------------------------------------------------
# Periodic pipeline-health observer. Runs tools/health_check.py every 30 min:
#   1. Computes the 3 MVP checks (daily-slate heartbeat, weights freshness,
#      core model presence).
#   2. Writes docs/data/health.json + docs/data/health_alert_state.json.
#   3. POSTs to DISCORD_HEALTH_WEBHOOK on RED transitions (rate-limited 6h)
#      and once per day at 08:00 UTC as a dead-man-switch digest.
#
# Setup (one-time, manual):
#   1. Create a Discord webhook: Server Settings -> Integrations -> Webhooks
#      -> New Webhook -> Copy URL.
#   2. Add as repo secret: Settings -> Secrets and variables -> Actions ->
#      New repository secret -> Name: DISCORD_HEALTH_WEBHOOK, Value: <URL>.
# If the secret isn't set, the workflow still writes health.json (pull side
# of observability stays alive). Only the push half is disabled.
# =============================================================================
name: Pipeline health check

on:
  schedule:
    - cron: "7,37 * * * *"  # 2x/hour at off-peak min (GitHub delays/drops :00 and :30)
  workflow_dispatch:
    inputs:
      force_test_alert:
        description: 'Fire a synthetic Discord test ping (no real check runs)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          # Full history. `git log --grep` heartbeats must find WEEKLY commits
          # (refit-calibrator: / weekly-backtest:), not just daily-slate:. At
          # ~24 commits/day (health-check every 30m + daily-slate), depth 100
          # only spanned ~4 days, so the Sunday weekly commits scrolled out of
          # range by mid-week and the heartbeats false-RED-ed ("no commit found").
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Run health check
        env:
          DISCORD_HEALTH_WEBHOOK: ${{ secrets.DISCORD_HEALTH_WEBHOOK }}
          # workflow_dispatch input plumbs through here. On cron runs
          # this resolves to an empty string, so the script's truthy
          # check correctly skips the test path.
          FORCE_TEST_ALERT: ${{ inputs.force_test_alert }}
        run: python tools/health_check.py

      - name: Commit health artifacts (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/health.json docs/data/health_alert_state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no health-artifact changes to commit"
          else
            git commit -m "health-check: $(date -u +%Y-%m-%dT%H:%MZ)"
            # main moves often (daily-slate commits hourly); rebase before push
            # so a non-fast-forward doesn't fail the run, and a lost race just
            # retries next cycle instead of failing the workflow.
            git pull --rebase --autostash origin main || true
            git push origin main || echo "push race lost; next run will retry"
          fi
